<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>

<style>

body{
background:#1e1e2f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.calculator{
background:#2c2c3c;
padding:20px;
border-radius:10px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

#display{
width:100%;
height:50px;
font-size:22px;
margin-bottom:15px;
padding:5px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,70px);
gap:10px;
}

button{
height:50px;
font-size:20px;
border:none;
border-radius:6px;
cursor:pointer;

}

button:hover{
transform:scale(1.05);
}


.orange{
    background:#ff9500;
}
.equal{
    background-color: green;
}

.red{
    background:#ff3b30;

}
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" onkeyup="check()">

<div class="buttons">

<button class="red" onclick="clearDisplay()">AC</button>
<button class="red" onclick="deleteLast()">DEL</button>
<button class="orange" onclick="append('/')">/</button>
<button class="orange" onclick="append('*')">*</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="orange" onclick="append('-')">-</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="orange" onclick="append('+')">+</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="equal" onclick="calculate()">=</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>

</div>

</div>

<script>

let display = document.getElementById("display");

function append(value){
display.value += value;
}

function clearDisplay(){
display.value = "";
}

function deleteLast(){
display.value = display.value.slice(0,-1);
}

function calculate(){
    display.value = eval(display.value);
}

function check(){
    let value = display.value;

    // empty input
    if(value == ""){
        alert("Input cannot be empty");
    }

    // invalid characters check
    else if(isNaN(value) && !/[+\-*/.]/.test(value)){
        alert("Invalid number");
        display.value = "";
    }
}

</script>

</body>
</html>
