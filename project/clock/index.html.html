<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2b5fa6, #6fa8dc, #b7d7f2);
        }

        h1 {
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(238, 227, 223);
        }

        .clock {
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 50%;
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(white, white) padding-box,
                linear-gradient(45deg, #c0c0c0, #f0f0f0, #999) border-box;
            border: 12px solid transparent;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .clock-num {
            position: absolute;
            font-size: 1.5rem;
            font-weight: 600;
            color: #020202;
        }

        .num12 {
            top: 15px;
        }

        .num3 {

            right: 15px;
        }

        .num6 {
            bottom: 15px;
        }

        .num9 {
            left: 15px;
        }

        .dott {
            z-index: 5;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: black;
        }

        .clock-heads {
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .heads {
            position: absolute;
            width: 7px;
            height: 100px;
            border-radius: 50% 50% 0 0;
            background-color: green;
        }

        .head-hours {
            height: 80px;
        }

        .head-min {
            height: 90px;
            background: #3498db;
        }
    </style>
</head>

<body>
    <h1>Wall Clock</h1>

    <div class="clock">
        <div class="clock-heads" id="hour"><i class="heads head-hours" style="background-color: rgb(180, 187, 247);"></i></div>
        <div class="clock-heads" id="min"><i class="heads head-min" style="background-color: black;"></i></div>
        <div class="clock-heads" id="sec"><i class="heads" style="background-color: red;"></i></div>

        <span class="clock-num num12">12</span>
        <span class="clock-num num3">3</span>
        <span class="clock-num num6">6</span>
        <span class="clock-num num9">9</span>
        <span class="clock-num dott"></span>
    </div>




    <script>
        let h = document.getElementById("hour");
        let m = document.getElementById("min");
        let s = document.getElementById("sec");

        function clock() {
            let Dates = new Date();

            let hr = Dates.getHours();
            let mi = Dates.getMinutes();
            let se = Dates.getSeconds();

            let hrotate = (hr / 12) * 360;
            let mrotate = (mi / 60) * 360;
            let srotate = (se / 60) * 360;

            h.style.transform = `rotate(${hrotate}deg)`;
            m.style.transform = `rotate(${mrotate}deg)`;
            s.style.transform = `rotate(${srotate}deg)`;

        }

        setInterval(clock, 1000)



    </script>
</body>

</html>
